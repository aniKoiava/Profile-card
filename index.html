<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <title>profile card</title>
</head>
<body>
    <div class="circles">
        <img src="img/top.png" alt="">
        <img src="img/bottom.png" alt="" class="bottom">
    </div>
    <header></header>
    <main>
        <div class="card">
            <img src="img/bubbles.png" alt="" class="bubbles">
        
        <div class="pic">
            <img src="img/Oval (1).png" alt="">

        </div>
        <div class="name">
        <h2>Victor Crest</h2>
        <p>26</p>

        </div>
        <p class="london">London</p>

        <div class="social">
            <div class="followers">
                <p class="number">80K</p>
                <p class="follower">Followers</p>
            </div>

            <div class="likes">
                <p class="number">803K</p>
                <p class="like">Likes</p>
            </div>
            <div class="photo">
                <p class="number">1.4K</p>
                <p class="photos">Photos</p>
            </div>
        </div>

        </div>
    
    </main>
    <footer></footer>
</body>
</html>
